<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Jaiswal Packers and Movers - Professional shifting services across India" />
    <meta name="theme-color" content="#003366" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/logo.png">
   <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>Jaiswal Packers and Movers | Reliable Shifting Services</title>
    
    <!-- Leaflet Map CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
      :root {
        --primary: #1e40af;
        --primary-orange: #f97316;
        --secondary: #003366;
      }
      
      body { 
        font-family: 'Plus Jakarta Sans', sans-serif; 
        color: #0f172a;
        background-color: #f8fafc;
        margin: 0;
      }

      #root:empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: white;
      }

      #root:empty::before {
        content: "JAISWAL PACKERS AND MOVERS";
        font-weight: 900;
        color: var(--primary);
        letter-spacing: 0.1em;
        font-size: 14px;
        margin-bottom: 20px;
        animation: pulse 1.5s ease-in-out infinite;
      }

      #root:empty::after {
        content: "";
        width: 32px;
        height: 32px;
        border: 2px solid #f3f3f3;
        border-top: 2px solid var(--primary);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(0.98); }
      }

      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-4px); }
        75% { transform: translateX(4px); }
      }

      .animate-shake {
        animation: shake 0.2s ease-in-out 0s 2;
      }

      /* Fix for Leaflet controls on high z-index containers */
      .leaflet-container {
        z-index: 1 !important;
      }
    </style>

    <script>
      window.global = window;
    </script>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
